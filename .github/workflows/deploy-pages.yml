name: Deploy to GitHub Pages

# Builds a static, server-less version of NotationApp and publishes it to
# GitHub Pages. The static build excludes the AI/import/transcribe API routes
# (which need a server) — the client detects NEXT_PUBLIC_STATIC_EXPORT=1 and
# shows a "feature unavailable in this hosted build" message for those.
# Everything else (chord chart editing, notation step entry, MIDI keyboard,
# print, localStorage persistence) works fully client-side.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs if a new push lands on main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Strip the API routes — Next.js refuses `output: 'export'` if route
      # handlers exist, and they wouldn't run on a static host anyway.
      - name: Remove API routes for static build
        run: rm -rf src/app/api

      - name: Build static export
        env:
          # Public-facing API URL — baked into the static bundle. Set this
          # as a repository variable (Settings → Secrets and variables →
          # Actions → Variables). Empty value disables cloud sync and the
          # app falls back to localStorage-only mode.
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
        run: STATIC_EXPORT=1 npm run build

      # Next.js writes static export output to ./out
      - name: Disable Jekyll on Pages (so _next/ files are served)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if it isn't yet — saves a manual
          # toggle in repo settings before the first run.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - id: deploy
        uses: actions/deploy-pages@v4
